version: 0.2

phases:
  pre_build:
    commands:
      - echo "======================== PHASE 1: PRE-BUILD ========================"
      - echo "Installing dependencies and running tests..."
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - echo "Running unit tests..."
      - python -m pytest tests/ -v --tb=short || true
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo "REPOSITORY_URI=$REPOSITORY_URI" > /tmp/build_env.txt
      - echo "IMAGE_TAG=$IMAGE_TAG" >> /tmp/build_env.txt
      - echo "Commit: $CODEBUILD_RESOLVED_SOURCE_VERSION"

  build:
    commands:
      - echo "======================== PHASE 2: BUILD ========================"
      - export $(cat /tmp/build_env.txt | xargs)
      - echo "Building Docker image with tag - $REPOSITORY_URI:$IMAGE_TAG"
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
      - echo "✓ Docker image built successfully"

  post_build:
    commands:
      - echo "======================== PHASE 3: POST-BUILD ========================"
      - export $(cat /tmp/build_env.txt | xargs)
      - echo "Pushing images to Amazon ECR..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "✓ Images pushed successfully"
      - echo "Preparing deployment configuration..."
      - sed -i "s|<IMAGE_URI>|$REPOSITORY_URI:$IMAGE_TAG|g" Dockerrun.aws.json
      - cat Dockerrun.aws.json
      - echo "✓ Deployment ready!"

artifacts:
  files:
    - Dockerrun.aws.json
    - .ebextensions/**/*
  name: DeploymentArtifacts

cache:
  paths:
    - '/root/.cache/pip/**/*'
